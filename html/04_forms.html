<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forms</title>
  </head>
  <body>
    <h1>login form</h1>
    <form>
      <label for="Email">
        email:
        <input placeholder="abc" type="text" name="email" />
      </label>
      <br />
      <br />
      <label for="Password">
        password:
        <input type="password" name="password" />
      </label>
      <br />
      <br />
      <button type="submit">Login</button>
    </form>

    <div>
      <h2>learning form</h2>
      <form>
        <label for="email">
          Email:
          <input type="email" name="email" id="" />
        </label>
        <br />
        <br />
        <label for="description">
          description:
          <textarea rows="5" cols="20" name="description" id=""></textarea>
        </label>
        <br />
        <br />
        <label for="Games">
          Basketball:
          <input type="checkbox" name="" id="" />
          Football:
          <input type="checkbox" name="" id="" />
          Cricket:
          <input type="checkbox" name="" id="" />
        </label>
        <br />
        <br />
        <label for="Food">
          <select name="Food" id="">
            <option value="Apple">Apple</option>
            <option value="Mango">Mango</option>
            <option value="Banana">Banana</option>
          </select>
        </label>
        <br />
        <br />
        <label for="month"> month: <input type="month" name="" id="" /> </label>
        <label for="file"> file: <input type="file" name="" id="" /> </label>
        <br />
        <br />
        <button type="submit">submit</button>
      </form>
    </div>
  </body>
</html>
